before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - 386
      - amd64
      - arm64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - none*
changelog:
  skip: true
brews:
  - name: tfcloud
    tap:
      owner: chroju
      name: homebrew-tap
      token:
    url_template: "https://github.com/chroju/tfcloud/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "Terraform Cloud CLI tool"
    homepage: "https://github.com/chroju/tfcloud"
    license: "MIT"
    test: |
      system "#{bin}/tfcloud --version"
    install: |
      bin.install "tfcloud"
