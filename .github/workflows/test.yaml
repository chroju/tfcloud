name: Test
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    name: Test tfcloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - name: Run test
        run: go test -v ./...
